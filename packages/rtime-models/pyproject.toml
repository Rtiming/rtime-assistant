[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "rtime-models"
version = "0.1.0"
description = "Single non-secret source of truth for the rtime model directory + routing."
requires-python = ">=3.10"
dependencies = []

[project.scripts]
rtime-models = "rtime_models.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
rtime_models = ["../../model-registry.json"]
