[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "brain-docpack"
version = "0.1.0"
description = "CLI wrappers for rtime brain DocPack audit, build, sample selection, and validation."
requires-python = ">=3.11"
dependencies = []

[project.scripts]
brain-docpack = "brain_docpack.cli:main"
brain-docpack-mcp = "brain_docpack.mcp_server:main"

[tool.setuptools.packages.find]
where = ["src"]
