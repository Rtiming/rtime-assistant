[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "rtime-context"
version = "0.1.0"
description = "Read-only context unlock planner for rtime assistant workflows."
requires-python = ">=3.11"
dependencies = []

[project.scripts]
rtime-context = "rtime_context.cli:main"
rtime-context-mcp = "rtime_context.mcp_server:main"

[tool.setuptools.packages.find]
where = ["src"]
