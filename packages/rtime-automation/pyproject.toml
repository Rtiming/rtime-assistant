[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "rtime-automation"
version = "0.1.0"
description = "Read-only automation and reminder diagnostics for rtime-assistant."
requires-python = ">=3.11"
dependencies = []

[project.scripts]
rtime-automation = "rtime_automation.cli:main"
rtime-automation-mcp = "rtime_automation.mcp_server:main"

[tool.setuptools.packages.find]
where = ["src"]
