<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>rtime 问答</title>
<!--
  markdown+math via pinned-version CDN WITH SRI (no npm, no build step, no vendored
  KaTeX fonts in git). Every renderer is optional: if the CDN is unreachable
  (intranet), the page degrades to plain-text answers — feature-checked at render
  time, never assumed. Renders only run through DOMPurify; without it we stay
  plain text (never raw innerHTML of model output).
-->
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
      integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+"
      crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"
        integrity="sha384-/TQbtLCAerC3jgaim+N78RZSDYV7ryeoBCVqTuzRrFec2akfBkHS7ACQ3PQhvMVi"
        crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"
        integrity="sha384-+VfUPEb0PdtChMwmBcBmykRMDd+v6D/oFmB3rZM/puCMDYcIvF968OimRh4KQY9a"
        crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"
        integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg"
        crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
        integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk"
        crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #f6f7f9; --panel: #ffffff; --line: #e3e6ea;
    --text: #1c1f23; --muted: #7a828c; --accent: #2f6fed;
    --user-bubble: #2f6fed; --user-text: #ffffff;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.65 -apple-system, "PingFang SC", "Microsoft YaHei",
          "Noto Sans CJK SC", system-ui, sans-serif;
  }
  #app { display: flex; flex-direction: column; height: 100%; max-width: 820px; margin: 0 auto; }
  header {
    display: flex; align-items: center; gap: 10px; padding: 12px 16px;
    background: var(--panel); border-bottom: 1px solid var(--line);
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; flex: 1; }
  select, button, textarea { font: inherit; color: inherit; }
  #profile {
    padding: 6px 8px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel);
    max-width: 45%;
  }
  #newchat {
    padding: 6px 12px; border: 1px solid var(--line); border-radius: 8px;
    background: var(--panel); cursor: pointer;
  }
  #newchat:hover { border-color: var(--accent); color: var(--accent); }
  #transcript { flex: 1; overflow-y: auto; padding: 18px 16px 6px; }
  .msg { margin: 0 0 14px; display: flex; }
  .msg.user { justify-content: flex-end; }
  .bubble {
    max-width: 86%; padding: 9px 13px; border-radius: 12px; overflow-wrap: break-word;
    background: var(--panel); border: 1px solid var(--line); white-space: pre-wrap;
  }
  .msg.user .bubble { background: var(--user-bubble); color: var(--user-text); border: 0; }
  .bubble.rich { white-space: normal; }
  .bubble.rich > :first-child { margin-top: 0; }
  .bubble.rich > :last-child { margin-bottom: 0; }
  .bubble.rich pre { overflow-x: auto; background: #f2f4f7; padding: 8px 10px; border-radius: 8px; }
  .bubble.rich code { background: #f2f4f7; border-radius: 4px; padding: 1px 4px; }
  .bubble.rich pre code { background: none; padding: 0; }
  .bubble.rich table { border-collapse: collapse; }
  .bubble.rich th, .bubble.rich td { border: 1px solid var(--line); padding: 4px 8px; }
  .bubble.error { border-color: #e2a0a0; background: #fbf0f0; color: #a33; }
  #working {
    display: none; align-items: center; gap: 8px; padding: 2px 16px 8px;
    color: var(--muted); font-size: 13px;
  }
  #working.on { display: flex; }
  #working .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    animation: pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: .25; } 50% { opacity: 1; } }
  footer {
    display: flex; gap: 8px; padding: 10px 16px 14px;
    background: var(--panel); border-top: 1px solid var(--line);
  }
  #input {
    flex: 1; resize: none; padding: 9px 12px; border: 1px solid var(--line);
    border-radius: 10px; outline: none; background: var(--bg); max-height: 140px;
  }
  #input:focus { border-color: var(--accent); background: var(--panel); }
  #send {
    padding: 0 18px; border: 0; border-radius: 10px; background: var(--accent);
    color: #fff; cursor: pointer;
  }
  #send:disabled { opacity: .5; cursor: default; }
  .note { text-align: center; color: var(--muted); font-size: 13px; margin: 8px 0 16px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>rtime 问答</h1>
    <select id="profile" title="选择助手"></select>
    <button id="newchat" title="开始新对话">新对话</button>
  </header>
  <main id="transcript"><p class="note">选择上方助手，开始提问。</p></main>
  <div id="working"><span class="dot"></span><span id="working-text">处理中…</span></div>
  <footer>
    <textarea id="input" rows="2" placeholder="输入问题（Enter发送，Shift+Enter换行）"></textarea>
    <button id="send">发送</button>
  </footer>
</div>
<script>
"use strict";
(function () {
  const $ = (id) => document.getElementById(id);
  const transcript = $("transcript"), input = $("input"), sendBtn = $("send");
  const profileSel = $("profile"), working = $("working"), workingText = $("working-text");

  let sessionId = null;   // set from the first done event; reset on 新对话/切换助手
  let busy = false;

  // --- profiles dropdown ---------------------------------------------------
  fetch("api/profiles").then((r) => r.json()).then((data) => {
    (data.profiles || []).forEach((p) => {
      const opt = document.createElement("option");
      opt.value = p.id;
      opt.textContent = p.name + (p.read_only ? "（只读）" : "");
      opt.title = p.description || "";
      profileSel.appendChild(opt);
    });
    if (data.default) profileSel.value = data.default;
  }).catch(() => note("加载助手列表失败，请刷新重试。"));

  profileSel.addEventListener("change", resetSession);
  $("newchat").addEventListener("click", () => { resetSession(); note("已开始新对话。"); });

  function resetSession() { sessionId = null; }
  function note(text) {
    const p = document.createElement("p");
    p.className = "note"; p.textContent = text;
    transcript.appendChild(p); scrollDown();
  }
  function scrollDown() { transcript.scrollTop = transcript.scrollHeight; }

  // --- rendering: markdown+KaTeX when CDN libs loaded, plain text otherwise --
  function renderRich(el, text) {
    if (window.marked && window.DOMPurify) {
      el.classList.add("rich");
      el.innerHTML = window.DOMPurify.sanitize(window.marked.parse(text));
      if (window.renderMathInElement) {
        try {
          window.renderMathInElement(el, {
            delimiters: [
              { left: "$$", right: "$$", display: true },
              { left: "\\[", right: "\\]", display: true },
              { left: "$", right: "$", display: false },
              { left: "\\(", right: "\\)", display: false },
            ],
            throwOnError: false,
          });
        } catch (e) { /* keep the sanitized markdown */ }
      }
    } else {
      el.classList.remove("rich");
      el.textContent = text;  // CDN unreachable -> plain text, still fully usable
    }
  }

  function addBubble(role) {
    const wrap = document.createElement("div");
    wrap.className = "msg " + role;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    wrap.appendChild(bubble);
    transcript.appendChild(wrap);
    scrollDown();
    return bubble;
  }

  // --- SSE-over-fetch (EventSource is GET-only; the API is POST) -------------
  async function streamChat(body, handlers) {
    const res = await fetch("api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "text/event-stream" },
      body: JSON.stringify(body),
    });
    if (!res.ok || !res.body) {
      let detail = "HTTP " + res.status;
      try { detail = (await res.json()).error || detail; } catch (e) { /* keep status */ }
      throw new Error(detail);
    }
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";
    for (;;) {
      const { value, done } = await reader.read();
      buf += done ? "" : decoder.decode(value, { stream: true });
      const frames = buf.split("\n\n");
      buf = done ? "" : frames.pop();
      for (const frame of frames) {
        const data = frame.split("\n")
          .filter((l) => l.startsWith("data:"))
          .map((l) => l.slice(5).trimStart())
          .join("\n");
        if (!data) continue;
        let ev;
        try { ev = JSON.parse(data); } catch (e) { continue; }
        handlers[ev.type] && handlers[ev.type](ev);
      }
      if (done) break;
    }
  }

  // --- send flow -------------------------------------------------------------
  async function send() {
    const message = input.value.trim();
    if (!message || busy) return;
    busy = true; sendBtn.disabled = true; input.value = "";
    addBubble("user").textContent = message;
    const bubble = addBubble("assistant");
    let streamed = "";
    working.classList.add("on"); workingText.textContent = "连接中…";
    try {
      await streamChat(
        { profile: profileSel.value, message: message, session_id: sessionId, stream: true },
        {
          status: (ev) => { workingText.textContent = ev.text || "处理中…"; },
          delta: (ev) => {
            streamed += ev.text || "";
            bubble.textContent = streamed;  // plain text while streaming (safe + fast)
            scrollDown();
          },
          done: (ev) => {
            sessionId = ev.session_id || sessionId;
            renderRich(bubble, ev.answer || streamed || "（空回答）");
            if (ev.used_fresh_session_fallback) note("（上一段会话已失效，已自动新开一段对话）");
            scrollDown();
          },
          error: (ev) => {
            bubble.classList.add("error");
            bubble.textContent = ev.message || "出错了，请重试。";
          },
        }
      );
    } catch (err) {
      bubble.classList.add("error");
      bubble.textContent = "请求失败：" + (err && err.message ? err.message : err);
    } finally {
      working.classList.remove("on");
      busy = false; sendBtn.disabled = false; input.focus();
    }
  }

  sendBtn.addEventListener("click", send);
  input.addEventListener("keydown", (ev) => {
    if (ev.key === "Enter" && !ev.shiftKey) { ev.preventDefault(); send(); }
  });
  input.focus();
})();
</script>
</body>
</html>
